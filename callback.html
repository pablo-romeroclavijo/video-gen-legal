<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TikTok Authorization</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 60px auto; padding: 0 20px; background: #0d1117; color: #e6edf3; }
    h2 { color: #58a6ff; }
    .box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin: 20px 0; word-break: break-all; }
    .label { color: #8b949e; font-size: 0.85em; margin-bottom: 6px; }
    .value { color: #7ee787; font-size: 1em; }
    .url { color: #ffa657; font-size: 0.85em; margin-top: 20px; }
    .error { color: #f85149; }
    button { background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: monospace; margin-top: 8px; }
    button:hover { background: #2ea043; }
  </style>
</head>
<body>
  <h2>TikTok Authorization</h2>
  <div id="content"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const div = document.getElementById('content');

    if (error) {
      div.innerHTML = `<div class="box"><span class="error">Error: ${error}</span></div>`;
    } else if (code) {
      div.innerHTML = `
        <p>Authorization successful. Copy the full URL below and paste it into the terminal.</p>
        <div class="box">
          <div class="label">Full URL (paste this into the terminal):</div>
          <div class="value" id="fullurl">${window.location.href}</div>
          <button onclick="navigator.clipboard.writeText(document.getElementById('fullurl').innerText)">Copy</button>
        </div>
        <div class="box">
          <div class="label">Code:</div>
          <div class="value">${code}</div>
        </div>
      `;
    } else {
      div.innerHTML = `<div class="box"><span class="error">No authorization code found in URL.</span></div>`;
    }
  </script>
</body>
</html>
